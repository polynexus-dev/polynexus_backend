services:
  db:
    image: postgres:15-alpine
    container_name: polynexus_db
    environment:
      POSTGRES_DB: polynexus_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: polynexus_backend
    ports:
      - "7770:7770"
    volumes:
      - .:/app
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-f@@9d*&=w_a*nuc()fa1o!ll$$wjkeejbd^3p#&uzxo_$$h=*hg=
      - DB_NAME=polynexus_db
      - DB_USER=postgres
      - DB_PASSWORD=admin
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
